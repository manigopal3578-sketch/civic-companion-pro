<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#0D1B2A"/><g fill="none" stroke="#FF9932" stroke-width="2.5"><circle cx="50" cy="50" r="38"/><circle cx="50" cy="50" r="7" fill="#FF9932"/></g><g stroke="#FF9932" stroke-width="1.4">${[...Array(24)].map((_,i)=>{const a=i*15*Math.PI/180;return `<line x1="50" y1="50" x2="${50+Math.cos(a)*36}" y2="${50+Math.sin(a)*36}"/>`}).join('')}</g></svg>
